<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBX JOKI FF PRO MAX</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{background:#000;color:#0ff;font-family:sans-serif;margin:0}
.card{background:#111;border:1px solid cyan;padding:10px;margin:10px;border-radius:10px}
button,input{width:100%;margin-top:5px;padding:10px}
.bottomNav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:10px}
.section{display:none}
.active{display:block}
</style>
</head>

<body>

<h2 style="text-align:center">👑 RBX JOKI FF PRO MAX</h2>

<div id="home" class="section active">
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>
<button onclick="loginUser()">Login</button>
<button onclick="loginGoogle()">Google</button>
<p id="user"></p>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="history"></div>
</div>
</div>

<div id="admin" class="section">
<div class="card">
<h3>ADMIN PANEL</h3>
<div id="adminOrders"></div>
</div>
</div>

<div class="bottomNav">
<button onclick="openTab('home')">🏠</button>
<button onclick="openTab('admin')">⚙️</button>
</div>

<script>

/* ✅ CONFIG FIREBASE (WAJIB LENGKAP!) */
firebase.initializeApp({
  apiKey: "AIzaSyANTek9UccovUUtI2X3fzQmLU2D0eCvnPg",
  authDomain: "rbx-joki-ff.firebaseapp.com",
  projectId: "rbx-joki-ff",
  storageBucket: "rbx-joki-ff.firebasestorage.app",
  messagingSenderId: "715158267681",
  appId: "1:715158267681:web:85461a4a161056efe50060"
});

const db = firebase.firestore();
let userData=null;
let role="user";

/* NAV */
function openTab(t){
if(t==="admin" && role!=="admin"){
alert("Akses ditolak ❌");
return;
}
document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* REGISTER */
async function register(){
try{
let res = await firebase.auth().createUserWithEmailAndPassword(
email.value.trim(),
password.value.trim()
);

/* otomatis buat role user */
await db.collection("roles").doc(res.user.uid).set({
role:"user"
});

alert("Berhasil daftar!");
}catch(e){alert(e.message)}
}

/* LOGIN */
function loginUser(){
firebase.auth().signInWithEmailAndPassword(
email.value.trim(),
password.value.trim()
).catch(e=>alert(e.message));
}

/* GOOGLE */
async function loginGoogle(){
try{
let res = await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());

await db.collection("roles").doc(res.user.uid).set({
role:"user"
},{merge:true});

}catch(e){alert(e.message)}
}

/* STATE LOGIN */
firebase.auth().onAuthStateChanged(async user=>{
if(!user) return;

userData=user;
document.getElementById("user").innerText="Login: "+user.email;

/* ambil role */
let doc = await db.collection("roles").doc(user.uid).get();
if(doc.exists){
role = doc.data().role;
}

/* ADMIN AUTO AKSES */
if(user.uid==="KF3xI5UGind2YpkZjIaAQ8Fev1G3"){
role="admin";
}

/* load data */
loadHistory();
});

/* HISTORY */
function loadHistory(){
db.collection("orders")
.where("userId","==",userData.uid)
.onSnapshot(snap=>{
let html="";
snap.forEach(d=>{
let x=d.data();
html+=`<div>${x.nick || "-"} (${x.progress || 0}%)</div>`;
});
document.getElementById("history").innerHTML=html;
});
}

</script>
</body>
</html>

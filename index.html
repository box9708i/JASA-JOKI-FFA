<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBX JOKI FF PRO MAX</title>

<meta name="theme-color" content="#000000">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#000;
color:#0ff;
font-family:sans-serif;
}

/* HEADER */
.header{
text-align:center;
padding:15px;
font-size:20px;
background:#000;
position:sticky;
top:0;
}

/* CONTAINER */
.container{
padding:10px;
min-height:100vh;
padding-bottom:80px;
}

/* SECTION */
.section{display:none}
.active{display:block}

/* CARD */
.card{
background:#111;
border:1px solid cyan;
padding:15px;
border-radius:10px;
margin-top:10px;
}

/* FORM */
button,input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
}

button{
background:cyan;
color:#000;
border:none;
}

input,select{
background:#000;
border:1px solid cyan;
color:#0ff;
}

/* NAV */
.bottomNav{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:cyan;
color:#000;
padding:10px;
display:none;
}
</style>
</head>

<body>

<div class="header">👑 RBX JOKI FF PRO MAX</div>
<div id="toast" class="toast"></div>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">

<div class="card">
<h3>🔥 Joki FF Premium</h3>
<button onclick="openTab('order')">Order Sekarang</button>
</div>

<div class="card">
<h3>🔐 Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>
<button onclick="loginUser()">Login Email</button>
<button onclick="loginGoogle()">Login Google</button>
<button onclick="resetPassword()">Reset Password</button>
<p id="user"></p>
</div>

<div class="card">
<h3>📄 Riwayat</h3>
<div id="history"></div>
</div>

</div>

<!-- ORDER -->
<div id="order" class="section">
<div class="card">
<input id="nick" placeholder="Nickname">

<select id="rank">
<option>Bronze</option><option>Silver</option><option>Gold</option>
<option>Platinum</option><option>Diamond</option>
<option>Heroic</option><option>Master</option>
</select>

<select id="target">
<option>Silver</option><option>Gold</option>
<option>Platinum</option><option>Diamond</option>
<option>Heroic</option><option>Master</option>
</select>

<select id="speed">
<option value="normal">Normal</option>
<option value="express">⚡ Express</option>
</select>

<button onclick="order()">🚀 ORDER</button>
<button onclick="kirimReport()">🚨 Report</button>
</div>

<div id="orders"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<div class="card"><h3>📊 Orders</h3><div id="adminOrders"></div></div>
<div class="card"><h3>📨 Reports</h3><div id="reports"></div></div>
<div class="card"><h3>📈 Logs</h3><div id="logs"></div></div>
</div>

</div>

<div class="bottomNav">
<div onclick="openTab('home')">🏠</div>
<div onclick="openTab('order')">🎮</div>
<div onclick="openTab('admin')">⚙️</div>
</div>

<script>

/* 🔥 ISI CONFIG FIREBASE KAMU */
firebase.initializeApp({
  apiKey: "AIzaSyANTek9UccovUUtI2X3fzQmLU2D0eCvnPg",
  authDomain: "http://rbx-joki-ff.firebaseapp.com",
  projectId: "rbx-joki-ff"
});

const db=firebase.firestore();
let userData=null, role="user";

/* NAV */
function openTab(t){
if(role!=="admin" && t==="admin") return notif("Akses ditolak");
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* AUTH */
async function register(){
try{
let res=await firebase.auth().createUserWithEmailAndPassword(email.value,password.value);
await db.collection("roles").doc(res.user.uid).set({role:"user"});
notif("Akun dibuat!");
}catch(e){notif(e.message)}
}

function loginUser(){
firebase.auth().signInWithEmailAndPassword(email.value,password.value)
.catch(e=>notif(e.message));
}

async function loginGoogle(){
try{
let res=await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
await db.collection("roles").doc(res.user.uid).set({role:"user"},{merge:true});
}catch(e){notif(e.message)}
}

function resetPassword(){
firebase.auth().sendPasswordResetEmail(email.value);
notif("Email reset dikirim");
}

/* STATE */
firebase.auth().onAuthStateChanged(async u=>{
if(!u) return;
userData=u;
document.getElementById("user").innerText=u.email;

let r=await db.collection("roles").doc(u.uid).get();
if(r.exists) role=r.data().role;

loadHistory();
});

/* ORDER */
async function order(){
if(!userData) return notif("Login dulu!");

await db.collection("orders").add({
userId:userData.uid,
nick:nick.value,
rank:rank.value,
target:target.value,
progress:0,
createdAt:Date.now()
});

notif("Order dibuat!");
}

/* HISTORY */
function loadHistory(){
db.collection("orders").where("userId","==",userData.uid)
.onSnapshot(s=>{
let h="";
s.forEach(d=>{
let x=d.data();
h+=`<div class="card">${x.nick} - ${x.progress}%</div>`;
});
document.getElementById("history").innerHTML=h;
});
}

/* REPORT */
function kirimReport(){
let msg=prompt("Isi laporan");
if(!msg) return;
db.collection("reports").add({msg:msg,time:Date.now()});
}

/* NOTIF */
function notif(t){
let toast=document.getElementById("toast");
toast.innerText=t;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);
}

</script>

</body>
</html>
